</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" aria-label="Navegación principal">
      <div class="container-fluid px-4">
        <a class="navbar-brand-custom" href="../index.html">MANGAS <span>VXL</span></a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Abrir menú">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
            <li class="nav-item"><a class="nav-link active" href="contacto.html" aria-current="page">Contacto</a></li>
            <li class="nav-item"><a class="nav-link" href="carrito.html" aria-label="Ver carrito de compras"><i class="bi bi-cart3"></i>
                <span class="d-none d-md-inline">Carrito</span>
                <span id="contador-carrito" class="badge bg-danger rounded-pill ms-1" aria-live="polite">0</span></a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="seccion" aria-labelledby="titulo-contacto">
      <div class="container">

        <h2 class="seccion-titulo" id="titulo-contacto">Contáctanos</h2>

        <form id="formulario-contacto" class="form-card" novalidate aria-label="Formulario de contacto">

          <!-- Nombre -->
          <div class="mb-3">
            <label for="nombre" class="form-label"> Nombre completo  <span class="text-danger">*</span></label>
              <input type="text" id="nombre" class="form-control" placeholder="Ej: Luis Fernando Quispe Castillo" autocomplete="name">
                <span id="error-nombre" class="campo-error" role="alert" aria-live="polite"></span>
          </div>

          <!-- Correo -->
          <div class="mb-3">
            <label for="correo" class="form-label"> Correo electrónico <span class="text-danger">*</span></label>
              <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com" autocomplete="email">
                <span id="error-correo" class="campo-error" role="alert" aria-live="polite"></span>
          </div>

          <!-- Asunto -->
          <div class="mb-3">
            <label for="asunto" class="form-label"> Asunto <span class="text-danger">*</span></label>
              <input type="text" id="asunto" class="form-control" placeholder="¿En qué te podemos ayudar?">
                <span id="error-asunto" class="campo-error" role="alert" aria-live="polite"></span>
          </div>

          <!-- Mensaje -->
          <div class="mb-4">
            <label for="mensaje" class="form-label">Mensaje <span class="text-danger">*</span></label>
              <textarea id="mensaje" class="form-control" rows="5" placeholder="Escribe tu mensaje aquí (mínimo 10 caracteres)..."></textarea>
                <span id="error-mensaje" class="campo-error" role="alert" aria-live="polite"></span>
          </div>

          <!-- CAMBIO: Bootstrap Icons bi-send en botón de envío (S14 diap. 15) -->
          <button type="submit" class="btn btn-primary w-100" ><i class="bi bi-send me-2"></i>Enviar mensaje</button>
            <p class="text-muted small mt-3 text-center"><span class="text-danger">*</span> Campos obligatorios</p>

        </form>

        <!-- Mensaje de éxito — formulario.js lo muestra al enviar -->
        <div id="mensaje-exito-contacto" class="d-none alert alert-success mt-4 text-center form-card" role="status" aria-live="polite">
          ✅ <strong>¡Mensaje enviado!</strong> Te responderemos a la brevedad.
        </div>

      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <h3>Mangas VXL</h3>
      <p>Tu tienda especializada en mangas en español.</p>
      <p class="mb-0">© 2026 Mangas VXL. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/contador.js"></script>
  <script src="../js/formulario.js"></script>
  <script src="../js/carrito.js"></script>

</body>
</html>
