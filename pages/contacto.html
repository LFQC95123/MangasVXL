<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mangas VXL</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

    <!-- HEADER -->
    <header>

        <div class="logo">
            <h1>MANGAS <span>VXL</span></h1>
        </div>

        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html">🛒<span id="contador-carrito">0</span></a></li>
            </ul>
        </nav>

    </header>

    <!-- FORMULARIO -->
    <main>

        <section class="contacto">

            <h2>Contáctanos</h2>

            <form id="formulario-contacto">

                <input
                    type="text"
                    id="nombre"
                    placeholder="Nombre completo"
                    required
                >

                <input
                    type="email"
                    id="correo"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="text"
                    id="asunto"
                    placeholder="Asunto"
                    required
                >

                <textarea
                    id="mensaje"
                    rows="6"
                    placeholder="Escribe tu mensaje..."
                    required
                ></textarea>

                <button type="submit" class="btn">
                    Enviar mensaje
                </button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <h3>Mangas VXL</h3>

        <p>Tu tienda especializada en mangas en español.</p>

        <p>© 2026 Mangas VXL. Todos los derechos reservados.</p>

    </footer>

    <script src="../js/formulario.js"></script>
    <script src="../js/contador.js"></script>
    <script src="../js/carrito.js"></script>

</body>
</html>
