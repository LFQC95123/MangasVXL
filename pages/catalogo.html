<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de mangas de Mangas VXL">
    <title>Catálogo | Mangas VXL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

    <!-- HEADER -->
    <header>

        <div class="logo">
            <h1>MANGAS <span>VXL</span></h1>
        </div>

        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html">🛒<span id="contador-carrito">0</span></a></li>
            </ul>
        </nav>

    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main>

        <!-- TÍTULO -->
        <section class="destacados">
            <h2>Catálogo de Mangas</h2>
        </section>

        <!-- BUSCADOR -->
        <section class="buscador">
            <div class="contenedor-buscador">
                <input type="text" id="busqueda" placeholder="Buscar manga...">
            </div>
        </section>

        <!-- FILTROS -->
        <section class="categorias">

            <h2>Categorías</h2>

            <div class="contenedor-filtros">

                <button class="btn-filtro" data-categoria="Todos">
                    Todos
                </button>

                <button class="btn-filtro" data-categoria="Shonen">
                    Shonen
                </button>

                <button class="btn-filtro" data-categoria="Acción">
                    Acción
                </button>

                <button class="btn-filtro" data-categoria="Sobrenatural">
                    Sobrenatural
                </button>

                <button class="btn-filtro" data-categoria="Fantasía">
                    Fantasía
                </button>

            </div>

        </section>

        <!-- PRODUCTOS -->
        <section class="destacados">

            <div id="catalogo-productos" class="contenedor-productos">

                <!-- JS insertará los mangas -->

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <div class="footer-contenido">

            <h3>Mangas VXL</h3>

            <p>
                Tu tienda especializada en mangas en español.
            </p>

            <p>
                © 2026 Mangas VXL. Todos los derechos reservados.
            </p>

        </div>

    </footer>

    <!-- JAVASCRIPT -->
    <script src="../js/productos.js"></script>
    <script src="../js/catalogo.js"></script>
    <script src="../js/contador.js"></script>
    <script src="../js/carrito.js"></script>

</body>
</html>
