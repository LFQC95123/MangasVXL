<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo completo de mangas de Mangas VXL. Filtra por categoría o busca tu título favorito.">
  <meta name="keywords" content="manga, catálogo, shonen, acción, fantasía, sobrenatural">
  <meta name="author" content="Grupo_E">
  <title>Catálogo | Mangas VXL</title>
  <!-- Open Graph|Para compartir en las diversas redes sociales -->
  <meta property="og:title"       content="Catálogo | MangasVXL">
  <meta property="og:description" content="Explora mangas populares y encuentra tus historias favoritas.">
  <meta property="og:image"       content="https://lfqc95123.github.io/MangasVXL/img/logo.png">
  <meta property="og:url"         content="https://lfqc95123.github.io/MangasVXL/pages/catalogo.html">
  <meta property="og:type"        content="website">
<!-- Twitter Card|Para compartir en Twitter(X) -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="MangasVXL">
  <meta name="twitter:description" content="Explora mangas populares y encuentra tus historias favoritas.">
  <meta name="twitter:image"       content="https://lfqc95123.github.io/MangasVXL/img/logo.png">

  <!-- Bootstrap CSS CDN — Para el funcionamiento de la barra de navegación y estilos generales -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons CDN — Para los iconos del toggler y el carrito -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">

</head>
<body>
  <!--NAVBAR|Utilizamos sticky-top para que la barra de navegación permanezca visible al desplazarse por la pagina-->
  <header class="sticky-top">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Navegación principal">
      <div class="container-fluid px-4">
        <a class="navbar-brand-custom" href="../index.html">MANGAS <span>VXL</span></a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Abrir menú"> <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link active" href="catalogo.html" aria-current="page">Catálogo</a></li>
            <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
            <li class="nav-item"><a class="nav-link" href="carrito.html" aria-label="Ver carrito de compras"><i class="bi bi-cart3"></i>
                <span class="d-none d-md-inline">Carrito</span>
                <span id="contador-carrito" class="badge bg-danger rounded-pill ms-1" aria-live="polite">0</span></a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>

    <section class="seccion pb-0" aria-labelledby="titulo-catalogo">
      <div class="container">
        <h2 class="seccion-titulo" id="titulo-catalogo">Catálogo de Mangas</h2>
      </div>
    </section>

    <!-- BUSCADOR|-->
    <section class="py-3" aria-label="Búsqueda de mangas">
      <div class="container">
        <!-- Display flex |centra todo el contenido al centro--> 
        <div class="d-flex justify-content-center">
          <!-- w-100 |ocupa el 100% del ancho disponible| pero un maximo de 600px--> 
          <div class="w-100" style="max-width:600px;">
            <!-- Uso de elementos para la búsqueda|ademas de una correcta accesibilidad--> 
            <label for="busqueda" class="visually-hidden">Buscar manga por nombre</label>
            <input type="search" id="busqueda" class="form-control form-control-lg" placeholder="Buscar manga..." aria-label="Buscar manga por nombre">
          </div>
        </div>
      </div>
    </section>

    <!-- FILTROS POR CATEGORÍA -->
    <section class="py-3" aria-label="Filtros por categoría">
      <div class="container">
        <!-- Dispaly flex|reajuste cuando esl espacio es pequeño|contenido centrado|gap de 16px--> 
        <div class="d-flex flex-wrap justify-content-center gap-3">
          <button class="btn-filtro activo" data-categoria="Todos"        aria-pressed="true">Todos</button>
          <button class="btn-filtro"        data-categoria="Shonen"       aria-pressed="false">Shonen</button>
          <button class="btn-filtro"        data-categoria="Acción"       aria-pressed="false">Acción</button>
          <button class="btn-filtro"        data-categoria="Sobrenatural" aria-pressed="false">Sobrenatural</button>
          <button class="btn-filtro"        data-categoria="Fantasía"     aria-pressed="false">Fantasía</button>
        </div>
      </div>
    </section>

    <!-- PRODUCTOS-->
    <section class="seccion pt-3" aria-live="polite" aria-label="Listado de mangas">
      <div class="container">
        <!-- Bootstrap row para los productos segun el tamaño de la pantalla -->
        <div id="catalogo-productos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
          <!-- catalogo.js inserta los productos aquí -->
        </div>
      </div>
    </section>

  </main>

  <footer>
    <div class="container">
      <h3>Mangas VXL</h3>
      <p>Tu tienda especializada en mangas en español.</p>
      <p class="mb-0">© 2026 Mangas VXL. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/productos.js"></script>
  <script src="../js/catalogo.js"></script>
  <script src="../js/contador.js"></script>

</body>
</html>
